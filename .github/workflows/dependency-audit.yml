name: Dependency Vulnerability Audit (paymaster-server)

on:
  pull_request:
    paths:
      - "paymaster-server/**"
      - ".github/workflows/dependency-audit.yml"
  push:
    branches:
      - main
    paths:
      - "paymaster-server/**"
      - ".github/workflows/dependency-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: ${{ matrix.scanner }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scanner: cargo-audit
            working-directory: paymaster-server
          - scanner: pnpm-audit
            working-directory: .

    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: cargo-audit (Rust)
        if: matrix.scanner == 'cargo-audit'
        run: |
          cargo install cargo-audit --locked
          cargo audit --version
          cargo audit --json > "${RUNNER_TEMP}/cargo-audit-report.json"
          cargo audit --deny warnings

      - name: Upload cargo-audit report
        if: matrix.scanner == 'cargo-audit' && always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: ${{ runner.temp }}/cargo-audit-report.json
          if-no-files-found: warn

      - name: Install pnpm
        if: matrix.scanner == 'pnpm-audit'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        if: matrix.scanner == 'pnpm-audit'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: pnpm audit
        if: matrix.scanner == 'pnpm-audit'
        run: |
          pnpm audit --json > "${RUNNER_TEMP}/pnpm-audit-report.json" || true
          pnpm audit --audit-level=high

      - name: Upload pnpm-audit report
        if: matrix.scanner == 'pnpm-audit' && always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-audit-report
          path: ${{ runner.temp }}/pnpm-audit-report.json
          if-no-files-found: warn

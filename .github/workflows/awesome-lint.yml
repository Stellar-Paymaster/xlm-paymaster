name: Awesome Lint

on:
  push:
    paths:
      - "docs/awesome-paymaster.md"
  pull_request:
    paths:
      - "docs/awesome-paymaster.md"

jobs:
  lint:
    name: Lint awesome-paymaster list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run awesome-lint
        run: npx --yes awesome-lint docs/awesome-paymaster.md


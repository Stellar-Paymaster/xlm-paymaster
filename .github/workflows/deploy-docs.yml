name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Dependencies
        run: pnpm install

      - name: Generate Client Docs
        run: pnpm --filter client run docs

      - name: Generate Server Docs
        run: pnpm --filter server run docs

      - name: Generate Dashboard Docs
        run: pnpm --filter admin-dashboard run docs

      - name: Generate Rust Docs
        run: |
          cd paymaster-server
          cargo doc --no-deps

      - name: Assemble Docs
        run: |
          rm -rf docs/client docs/server docs/dashboard docs/rust
          mkdir -p docs/client docs/server docs/dashboard docs/rust
          cp -r client/docs/* docs/client/ || true
          cp -r server/docs/* docs/server/ || true
          cp -r admin-dashboard/docs/* docs/dashboard/ || true
          cp -r paymaster-server/target/doc/* docs/rust/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

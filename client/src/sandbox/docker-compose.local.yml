services:
  postgres:
    image: postgres:16-alpine
    container_name: paymaster-sandbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paymaster
      POSTGRES_USER: paymaster
      POSTGRES_PASSWORD: paymaster
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paymaster -d paymaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-horizon:
    image: ealen/echo-server:0.9.2
    container_name: paymaster-sandbox-mock-horizon
    restart: unless-stopped
    ports:
      - "18080:80"

  paymaster:
    build:
      context: ../../paymaster-server
      dockerfile: Dockerfile
    container_name: paymaster-sandbox-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mock-horizon:
        condition: service_started
    environment:
      PAYMASTER_SERVER_PORT: "8080"
      PAYMASTER_DATABASE_URL: "postgres://paymaster:paymaster@postgres:5432/paymaster"
      PAYMASTER_HORIZON_URL: "http://mock-horizon"
      PAYMASTER_ADMIN_TOKEN: "local-dev-admin-token"
    ports:
      - "18081:8080"

# NGINX rate-limiting configuration for Fluid API gateway (#715)
#
# Offloads basic API key validation and per-IP / per-key rate limiting from the
# Rust application process. Include this file from your main nginx.conf:
#
#   include /etc/nginx/conf.d/fluid-rate-limit.conf;

# ── Rate limit zones ──────────────────────────────────────────────────────────
# Global IP limit: 100 requests per minute per client IP
limit_req_zone $binary_remote_addr zone=fluid_ip_limit:10m rate=100r/m;

# Per-API-key limit: keyed on x-api-key header (empty keys fall into a shared bucket)
map $http_x_api_key $fluid_api_key_bucket {
    default                    $http_x_api_key;
    ""                         "__missing__";
}

limit_req_zone $fluid_api_key_bucket zone=fluid_key_limit:10m rate=5r/m;

# ── Allowed API keys (basic check at edge) ────────────────────────────────────
# For production, sync this map from your secrets manager or use auth_request
# to an external validator. Demo keys match fluid-server/src/state.rs API_KEYS.
map $http_x_api_key $fluid_api_key_valid {
    default                    0;
    "fluid-free-demo-key"      1;
    "fluid-pro-demo-key"       1;
}

# Per-tier rate overrides (free: 2/min, pro: 5/min)
map $http_x_api_key $fluid_tier_rate {
    default                    "5r/m";
    "fluid-free-demo-key"      "2r/m";
    "fluid-pro-demo-key"       "5r/m";
}

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream fluid_server_backend {
    server fluid-server:3000;
    keepalive 32;
}

server {
    listen 8080;

    # Reject requests without a valid API key before they reach the Rust process
    location / {
        if ($http_x_api_key = "") {
            return 401 '{"error":"Missing API key. Provide a valid x-api-key header.","code":"AUTH_FAILED"}';
        }

        if ($fluid_api_key_valid = 0) {
            return 403 '{"error":"Invalid API key.","code":"AUTH_FAILED"}';
        }

        # Apply IP-level and per-key rate limits
        limit_req zone=fluid_ip_limit burst=20 nodelay;
        limit_req zone=fluid_key_limit burst=10 nodelay;

        limit_req_status 429;

        proxy_pass         http://fluid_server_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Envoy-Auth-Status allowed;

        # Surface rate limit headers to clients
        add_header X-RateLimit-Limit  $fluid_tier_rate always;
    }

    location /health {
        proxy_pass http://fluid_server_backend/health;
        access_log off;
    }
}

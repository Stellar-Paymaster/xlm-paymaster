# NGINX rate-limiting configuration for Paymaster API gateway (#715)
#
# Offloads basic API key validation and per-IP / per-key rate limiting from the
# Rust application process. Include this file from your main nginx.conf:
#
#   include /etc/nginx/conf.d/paymaster-rate-limit.conf;

# ── Rate limit zones ──────────────────────────────────────────────────────────
# Global IP limit: 100 requests per minute per client IP
limit_req_zone $binary_remote_addr zone=paymaster_ip_limit:10m rate=100r/m;

# Tiered API key buckets
map $http_x_api_key $paymaster_free_bucket {
    "paymaster-free-demo-key"      $http_x_api_key;
    default                        "";
}

map $http_x_api_key $paymaster_pro_bucket {
    "paymaster-pro-demo-key"       $http_x_api_key;
    default                        "";
}

limit_req_zone $paymaster_free_bucket zone=paymaster_free_limit:10m rate=2r/m;
limit_req_zone $paymaster_pro_bucket zone=paymaster_pro_limit:10m rate=10r/m;

# ── Allowed API keys (basic check at edge) ────────────────────────────────────
# For production, sync this map from your secrets manager or use auth_request
# to an external validator. Demo keys match paymaster-server/src/state.rs API_KEYS.
map $http_x_api_key $paymaster_api_key_valid {
    default                    0;
    "paymaster-free-demo-key"      1;
    "paymaster-pro-demo-key"       1;
}

# Per-tier rate overrides (free: 2/min, pro: 10/min)
map $http_x_api_key $paymaster_tier_rate {
    default                    "2r/m";
    "paymaster-free-demo-key"      "2r/m";
    "paymaster-pro-demo-key"       "10r/m";
}

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream paymaster_server_backend {
    server paymaster-server:3000;
    keepalive 32;
}

server {
    listen 8080;

    # Reject requests without a valid API key before they reach the Rust process
    location / {
        if ($http_x_api_key = "") {
            return 401 '{"error":"Missing API key. Provide a valid x-api-key header.","code":"AUTH_FAILED"}';
        }

        if ($paymaster_api_key_valid = 0) {
            return 403 '{"error":"Invalid API key.","code":"AUTH_FAILED"}';
        }

        # Apply IP-level and per-key rate limits
        limit_req zone=paymaster_ip_limit burst=20 nodelay;
        limit_req zone=paymaster_free_limit burst=5 nodelay;
        limit_req zone=paymaster_pro_limit burst=20 nodelay;

        limit_req_status 429;

        proxy_pass         http://paymaster_server_backend;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Envoy-Auth-Status allowed;

        # Surface rate limit headers to clients
        add_header X-RateLimit-Limit  $paymaster_tier_rate always;
    }

    location /health {
        proxy_pass http://paymaster_server_backend/health;
        access_log off;
    }
}

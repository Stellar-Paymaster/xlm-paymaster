apiVersion: v1
kind: Service
metadata:
  name: {{ include "xlm-paymaster.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xlm-paymaster.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "xlm-paymaster.selectorLabels" (dict "root" . "component" "redis") | nindent 4 }}
  ports:
    - name: redis
      protocol: TCP
      port: {{ .Values.redis.port }}
      targetPort: redis

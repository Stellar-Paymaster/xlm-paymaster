apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xlm-paymaster.fullname" . }}-rust-engine
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xlm-paymaster.labels" . | nindent 4 }}
    app.kubernetes.io/component: rust-engine
spec:
  replicas: {{ .Values.rustEngine.replicaCount }}
  selector:
    matchLabels:
      {{- include "xlm-paymaster.selectorLabels" (dict "root" . "component" "rust-engine") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "xlm-paymaster.selectorLabels" (dict "root" . "component" "rust-engine") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "xlm-paymaster.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: rust-engine
          image: "{{ .Values.global.imageRegistry }}{{ .Values.rustEngine.image.repository }}:{{ .Values.rustEngine.image.tag }}"
          imagePullPolicy: {{ .Values.rustEngine.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.rustEngine.port }}
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.rustEngine.port | quote }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "xlm-paymaster.fullname" . }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.auth.database }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "xlm-paymaster.postgresSecretName" . }}
                  key: postgres-password
            - name: FLUID_FEE_PAYER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "xlm-paymaster.secretName" . }}
                  key: FLUID_FEE_PAYER_SECRET
            {{- with .Values.rustEngine.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.rustEngine.resources | nindent 12 }}

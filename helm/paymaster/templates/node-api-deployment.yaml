apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xlm-paymaster.fullname" . }}-node-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "xlm-paymaster.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-api
spec:
  replicas: {{ .Values.nodeApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "xlm-paymaster.selectorLabels" (dict "root" . "component" "node-api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "xlm-paymaster.selectorLabels" (dict "root" . "component" "node-api") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "xlm-paymaster.serviceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: node-api
          image: "{{ .Values.global.imageRegistry }}{{ .Values.nodeApi.image.repository }}:{{ .Values.nodeApi.image.tag }}"
          imagePullPolicy: {{ .Values.nodeApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.nodeApi.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.nodeApi.port | quote }}
            - name: STATELESS_MODE
              value: {{ .Values.nodeApi.statelessMode | quote }}
            - name: REDIS_URL
              value: "redis://{{ include "xlm-paymaster.fullname" . }}-redis:{{ .Values.redis.port }}"
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgres.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "xlm-paymaster.fullname" . }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.auth.database }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "xlm-paymaster.postgresSecretName" . }}
                  key: postgres-password
            - name: PAYMASTER_FEE_PAYER_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "xlm-paymaster.secretName" . }}
                  key: PAYMASTER_FEE_PAYER_SECRET
            - name: DATABASE_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "xlm-paymaster.secretName" . }}
                  key: DATABASE_ENCRYPTION_KEY
            - name: PAYMASTER_GRPC_ENGINE_ADDRESS
              value: "{{ include "xlm-paymaster.fullname" . }}-rust-engine:50051"
            {{- with .Values.nodeApi.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.nodeApi.resources | nindent 12 }}
